<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Demetre | Roblox Developer</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Poppins', sans-serif; background: #0f0f0f; color: white; }

header {
  height: 100vh;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  text-align: center;
}

header h1 { font-size: 3rem; }
header p { opacity: 0.7; margin-top: 10px; }

.btn {
  margin-top: 20px;
  padding: 12px 24px;
  background: #ff3c3c;
  border: none;
  border-radius: 8px;
  color: white;
  cursor: pointer;
  transition: 0.3s;
}

.btn:hover { transform: scale(1.1); }

section { padding: 60px 10%; }

.projects {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
  gap: 20px;
}

.card {
  background: #1a1a1a;
  padding: 20px;
  border-radius: 15px;
  transition: 0.3s;
}

.card:hover { transform: translateY(-10px); }

.card video {
  width: 100%;
  border-radius: 10px;
}

footer {
  text-align: center;
  padding: 20px;
  opacity: 0.5;
}
</style>
</head>
<body>

<header>
  <h1>Demetre</h1>
  <p>Roblox Developer | Combat Systems | UI | Gameplay</p>
  <button class="btn" onclick="scrollToProjects()">View My Work</button>
</header>

<section id="projects">
  <h2>My Projects</h2>
  <div class="projects">

    <div class="card">
      <video src="combat.mp4" controls></video>
      <h3>Combat System</h3>
      <p>Combo punches, ragdoll, knockback, blocking system.</p>
    </div>

    <div class="card">
      <video src="dash.mp4" controls></video>
      <h3>Dash System</h3>
      <p>Directional dash with animations and cooldowns.</p>
    </div>

    <div class="card">
      <video src="ui.mp4" controls></video>
      <h3>UI System</h3>
      <p>Smooth animated UI with hover effects.</p>
    </div>

  </div>
</section>

<footer>
  <p>Contact: yourdiscord#1234</p>
</footer>

<script>
function scrollToProjects() {
  document.getElementById('projects').scrollIntoView({ behavior: 'smooth' });
}
</script>

</body>
</html>
